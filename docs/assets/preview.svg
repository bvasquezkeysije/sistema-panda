<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B3D91"/>
      <stop offset="1" stop-color="#1F5FC7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FC"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#05285f" flood-opacity="0.24"/>
    </filter>
    <style>
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .slide { animation: slide 3.4s ease-in-out infinite; }
      .blink { animation: blink 1.7s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.82; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes slide {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(18px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="640" rx="24" fill="url(#bg)"/>

  <rect x="72" y="66" width="250" height="510" rx="20" fill="#E8EDF7" opacity="0.95"/>
  <rect x="348" y="66" width="780" height="78" rx="18" fill="#FFFFFF" opacity="0.96"/>
  <rect x="348" y="164" width="780" height="412" rx="20" fill="url(#panel)" filter="url(#shadow)"/>

  <circle cx="198" cy="140" r="36" fill="#0B3D91"/>
  <text x="198" y="146" text-anchor="middle" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#FFFFFF">P</text>

  <rect x="108" y="206" width="178" height="40" rx="10" fill="#0B3D91"/>
  <rect x="108" y="260" width="178" height="40" rx="10" fill="#FFFFFF" opacity="0.92"/>
  <rect x="108" y="314" width="178" height="40" rx="10" fill="#FFFFFF" opacity="0.92"/>
  <rect x="108" y="368" width="178" height="40" rx="10" fill="#FFFFFF" opacity="0.92"/>

  <text x="375" y="113" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#0B3D91">Sistema Panda</text>
  <text x="375" y="210" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#0B3D91">Módulo de Inventario</text>

  <rect x="375" y="238" width="420" height="44" rx="10" fill="#FFFFFF" stroke="#D8DEEA"/>
  <rect x="812" y="238" width="44" height="44" rx="10" fill="#FFFFFF" stroke="#D8DEEA"/>
  <rect x="868" y="238" width="44" height="44" rx="10" fill="#0B3D91"/>
  <rect x="924" y="238" width="44" height="44" rx="10" fill="#0B3D91"/>
  <rect x="980" y="238" width="44" height="44" rx="10" fill="#FFFFFF" stroke="#D8DEEA"/>

  <rect x="375" y="302" width="722" height="232" rx="14" fill="#FFFFFF" stroke="#D8DEEA"/>
  <rect x="392" y="320" width="688" height="32" rx="8" fill="#EEF3FB"/>
  <rect x="392" y="366" width="688" height="26" rx="6" fill="#F8FAFE"/>
  <rect x="392" y="402" width="688" height="26" rx="6" fill="#F8FAFE"/>
  <rect x="392" y="438" width="688" height="26" rx="6" fill="#F8FAFE"/>
  <rect x="392" y="474" width="688" height="26" rx="6" fill="#F8FAFE"/>

  <g class="slide">
    <rect x="996" y="366" width="76" height="26" rx="6" fill="#0B3D91" opacity="0.12"/>
    <rect x="996" y="402" width="76" height="26" rx="6" fill="#0B3D91" opacity="0.12"/>
    <rect x="996" y="438" width="76" height="26" rx="6" fill="#0B3D91" opacity="0.12"/>
  </g>

  <circle class="pulse" cx="1038" cy="260" r="7" fill="#E30613"/>
  <circle class="blink" cx="1058" cy="260" r="7" fill="#0B3D91"/>
  <circle class="blink" cx="1078" cy="260" r="7" fill="#111827"/>
</svg>
